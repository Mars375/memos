[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "memos-agent"
version = "1.0.0"
description = "Local-first persistent memory operating system for LLM agents, with CLI, REST API, dashboard, and MCP server."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Mars375", email = "proto.labs.rnd@gmail.com" }]
keywords = [
  "llm",
  "agent",
  "memory",
  "mcp",
  "rag",
  "knowledge-graph",
  "vector-search",
  "local-first",
]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "httpx>=0.25",
  "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/Mars375/memos"
Repository = "https://github.com/Mars375/memos"
Issues = "https://github.com/Mars375/memos/issues"
Changelog = "https://github.com/Mars375/memos/blob/main/CHANGELOG.md"

[project.optional-dependencies]
chroma = ["chromadb>=0.4"]
qdrant = ["qdrant-client>=1.7"]
pinecone = ["pinecone-client>=3.0"]
parquet = ["pyarrow>=12.0"]
server = ["fastapi>=0.104", "uvicorn>=0.24"]
dev = ["pytest>=7.0", "pytest-cov>=4.0", "httpx"]

[project.scripts]
memos = "memos.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
