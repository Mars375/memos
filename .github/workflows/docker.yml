name: Docker

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build PR smoke image
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: memos:smoke
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=memos-docker-main
          platforms: linux/amd64

      - name: Smoke test PR image
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm memos:smoke python -c "import os, getpass, memos; assert getpass.getuser() == 'memos'; assert os.environ['MEMOS_PERSIST_PATH'] == '/data/.memos/store.json'; assert os.environ['MEMOS_CACHE_PATH'] == '/data/.memos/embeddings.db'; print(memos.__version__)"

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=memos-docker-main
          cache-to: type=gha,scope=memos-docker-main,mode=max,ignore-error=true
          platforms: linux/amd64,linux/arm64
