name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[dev,server,parquet,qdrant,chroma]"
      - name: Test
        run: pytest -q --tb=short

  publish:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/memos-os/
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tools
        run: pip install build twine
      - name: Build package
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Smoke test built wheel
        run: |
          python -m venv /tmp/memos-wheel-smoke
          /tmp/memos-wheel-smoke/bin/pip install dist/*.whl
          /tmp/memos-wheel-smoke/bin/python - <<'PY'
          import importlib.metadata as metadata
          import memos
          from memos import MemOS

          assert metadata.version("memos-os") == memos.__version__
          MemOS()
          PY
          /tmp/memos-wheel-smoke/bin/memos --help
      - name: Smoke test built sdist
        run: |
          python -m venv /tmp/memos-sdist-smoke
          /tmp/memos-sdist-smoke/bin/pip install dist/*.tar.gz
          /tmp/memos-sdist-smoke/bin/python - <<'PY'
          import importlib.metadata as metadata
          import memos
          from memos import MemOS

          assert metadata.version("memos-os") == memos.__version__
          MemOS()
          PY
          /tmp/memos-sdist-smoke/bin/memos --help
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
