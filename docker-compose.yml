# MemOS — Memory Operating System
#
# Quick start (standalone, zero dependencies):
#   docker compose up memos-standalone
#   → API + Dashboard on http://localhost:8000
#   → JSON storage + built-in embeddings (all-MiniLM-L6-v2)
#
# With ChromaDB (production, better vector search):
#   docker compose --profile chroma up
#   → API on http://localhost:8100, ChromaDB on localhost:8001
#
# With Qdrant:
#   docker compose --profile qdrant up

services:
  # ── Standalone: single container, zero dependencies ──────────
  memos-standalone:
    image: ghcr.io/mars375/memos:latest
    ports:
      - "8100:8000"
    volumes:
      - memos-data:/root/.memos
    environment:
      - MEMOS_BACKEND=local
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Single command: docker compose up memos-standalone

  # ── ChromaDB profile (production) ────────────────────────────
  memos:
    image: ghcr.io/mars375/memos:latest
    profiles: ["chroma"]
    ports:
      - "8100:8000"
    volumes:
      - memos-data:/root/.memos
      - ./src/memos/web:/usr/local/lib/python3.11/site-packages/memos/web:ro
    environment:
      - MEMOS_BACKEND=chroma
      - MEMOS_CHROMA_URL=http://chroma:8000
      - MEMOS_EMBED_HOST=http://host.docker.internal:11434
      - MEMOS_EMBED_MODEL=nomic-embed-text
    depends_on:
      chroma:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  chroma:
    image: chromadb/chroma:1.5.7
    profiles: ["chroma"]
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "/usr/local/bin/chroma", "--help"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Qdrant profile ──────────────────────────────────────────
  memos-qdrant:
    image: ghcr.io/mars375/memos:latest
    profiles: ["qdrant"]
    ports:
      - "8000:8000"
    environment:
      - MEMOS_BACKEND=qdrant
      - MEMOS_QDRANT_HOST=qdrant
      - MEMOS_QDRANT_PORT=6333
      - MEMOS_EMBED_HOST=http://host.docker.internal:11434
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:v1.17.1
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chroma-data:
  qdrant-data:
  memos-data:
