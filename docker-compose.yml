# MemOS — One-command stack
# Usage: docker compose up
# - API on http://localhost:8000
# - Dashboard on http://localhost:8000/
# - ChromaDB on localhost:8001
# - Qdrant on localhost:6333

services:
  memos:
    image: ghcr.io/mars375/memos:latest
    ports:
      - "8100:8000"
    volumes:
      - memos-data:/root/.memos
      - /mnt/shared-storage/openclaw/workspace-labs:/data/host:ro
    environment:
      - MEMOS_BACKEND=chroma
      - MEMOS_CHROMA_URL=http://chroma:8000
    depends_on:
      chroma:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Qdrant profile (use with: docker compose --profile qdrant up) ---
  memos-qdrant:
    image: ghcr.io/mars375/memos:latest
    profiles: ["qdrant"]
    ports:
      - "8000:8000"
    environment:
      - MEMOS_BACKEND=qdrant
      - MEMOS_QDRANT_HOST=qdrant
      - MEMOS_QDRANT_PORT=6333
      - MEMOS_EMBED_HOST=http://host.docker.internal:11434
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "/usr/local/bin/chroma", "--help"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  chroma-data:
  qdrant-data:
  memos-data:
